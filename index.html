<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>みゆ Will you give me a second chance?</title>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap");

    :root {
      --bg1: #ffd1e4;
      --bg2: #fff3f8;
      --bg3: #ffc1d9;
      --card: rgba(255, 255, 255, 0.72);
      --yes: #ff3b7a;
      --yesHover: #ff1f68;
      --text: #3b1022;
      --softText: #7c4057;
      --white: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.9), transparent 22%),
        radial-gradient(circle at 84% 12%, rgba(255,105,155,.35), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.65), transparent 36%),
        linear-gradient(135deg, var(--bg2), var(--bg1), var(--bg3));
      font-family: "Nunito", system-ui, sans-serif;
      overflow: hidden;
      padding: 18px;
      color: var(--text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .35);
      filter: blur(4px);
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      left: -110px;
      top: -90px;
    }

    body::after {
      right: -120px;
      bottom: -120px;
      animation-delay: -3s;
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(740px, 92vw);
      padding: clamp(26px, 5vw, 44px) clamp(20px, 4vw, 38px);
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, .85);
      border-radius: 34px;
      text-align: center;
      box-shadow:
        0 30px 80px rgba(155, 43, 82, .22),
        inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 26px;
      border: 1px solid rgba(255, 93, 142, .16);
      pointer-events: none;
    }

    .card::after {
      content: "♡";
      position: absolute;
      right: 28px;
      top: 18px;
      font-size: 44px;
      color: rgba(255, 59, 122, .18);
      transform: rotate(14deg);
    }

    .art {
      width: min(275px, 78vw);
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 18px 22px rgba(160, 55, 85, .18));
      animation: gentleBounce 3.5s ease-in-out infinite;
    }

    h1 {
      max-width: 620px;
      margin: 12px auto 22px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      text-shadow: 0 2px 0 rgba(255,255,255,.7);
    }

    .button-zone {
      position: relative;
      width: min(540px, 94%);
      height: 160px;
      margin: 0 auto;
      touch-action: none;
    }

    button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 17px 28px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .02em;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition:
        transform .14s ease,
        background .14s ease,
        box-shadow .14s ease,
        filter .14s ease;
    }

    #yesBtn {
      left: 17%;
      color: var(--white);
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), transparent),
        linear-gradient(135deg, #ff5b91, var(--yes));
      box-shadow:
        0 14px 28px rgba(255, 59, 122, .36),
        inset 0 1px 0 rgba(255,255,255,.45);
    }

    #yesBtn:hover {
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), transparent),
        linear-gradient(135deg, #ff4383, var(--yesHover));
      filter: saturate(1.08);
    }

    #noBtn {
      left: 62%;
      background:
        linear-gradient(180deg, #ffffff, #edf0f5);
      color: #2b2f38;
      box-shadow:
        0 12px 26px rgba(77, 39, 53, .16),
        inset 0 1px 0 rgba(255,255,255,.9);
    }

    .hint {
      display: inline-block;
      margin-top: 4px;
      padding: 9px 15px;
      font-size: 14px;
      font-weight: 800;
      color: var(--softText);
      background: rgba(255, 255, 255, .48);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(155, 43, 82, .08);
    }

    .result {
      display: none;
      margin-top: 20px;
      animation: pop .35s ease;
    }

    .result h2 {
      font-size: clamp(34px, 5vw, 54px);
      margin: 8px 0 16px;
      line-height: 1;
      font-weight: 900;
      color: #ff2e76;
      text-shadow:
        0 2px 0 #fff,
        0 12px 30px rgba(255, 46, 118, .24);
    }

    .fireworks {
      width: min(390px, 90vw);
      margin: 0 auto;
      display: block;
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(155, 43, 82, .22);
      border: 8px solid rgba(255,255,255,.72);
    }

    @keyframes pop {
      from { transform: scale(.94); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(24px) scale(1.04); }
    }

    @media (max-width: 520px) {
      .button-zone {
        height: 170px;
      }

      button {
        padding: 15px 24px;
        font-size: 17px;
      }

      #yesBtn {
        left: 10%;
      }

      #noBtn {
        left: 58%;
      }
    }
  </style>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <main class="card">
    <!-- ANIMAL WITH HEART -->
    <svg class="art" viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fur" x1="0" x2="1">
          <stop offset="0" stop-color="#ffd6b6"/>
          <stop offset="1" stop-color="#f2a16e"/>
        </linearGradient>

        <linearGradient id="heart" x1="0" x2="1">
          <stop offset="0" stop-color="#ff6d98"/>
          <stop offset="1" stop-color="#ff1f68"/>
        </linearGradient>

        <radialGradient id="blush" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#ff7aa2" stop-opacity=".58"/>
          <stop offset="1" stop-color="#ff7aa2" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <path d="M250 50 C250 33 270 25 282 38
               C294 25 314 33 314 50
               C314 78 282 92 282 106
               C282 92 250 78 250 50Z"
            fill="url(#heart)"/>

      <path d="M90 120 C90 70 140 40 190 60
               C240 40 290 70 290 120
               C290 180 240 210 190 210
               C140 210 90 180 90 120Z"
            fill="url(#fur)"/>

      <path d="M110 92 L95 55 L140 78 Z" fill="#f0a06f"/>
      <path d="M270 92 L285 55 L240 78 Z" fill="#f0a06f"/>

      <path d="M111 83 L103 62 L129 77 Z" fill="#ffd0d7" opacity=".85"/>
      <path d="M269 83 L277 62 L251 77 Z" fill="#ffd0d7" opacity=".85"/>

      <ellipse cx="145" cy="147" rx="24" ry="16" fill="url(#blush)"/>
      <ellipse cx="235" cy="147" rx="24" ry="16" fill="url(#blush)"/>

      <circle cx="160" cy="130" r="8" fill="#2d1720"/>
      <circle cx="220" cy="130" r="8" fill="#2d1720"/>

      <circle cx="157" cy="127" r="2.5" fill="#fff"/>
      <circle cx="217" cy="127" r="2.5" fill="#fff"/>

      <path d="M190 144 C186 144 182 148 182 152
               C182 160 190 164 190 170
               C190 164 198 160 198 152
               C198 148 194 144 190 144Z"
            fill="#ff5f93"/>

      <path d="M174 177 C184 186 196 186 206 177"
            fill="none"
            stroke="#7c4057"
            stroke-width="5"
            stroke-linecap="round"/>
    </svg>

    <h1>みゆ Will you give me a second chance?</h1>

    <section class="button-zone" id="zone">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </section>

    <div class="hint" id="hint">“No” seems a bit shy 😈</div>

    <section class="result" id="result">
      <h2>YAY! 🎉</h2>
      <img
        class="fireworks"
        src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
        alt="Fireworks"
      />
    </section>
  </main>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const hint = document.getElementById("hint");

    /* ---------- CONFETTI ---------- */
    const confettiCanvas = document.getElementById("confettiCanvas");

    function resizeConfettiCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      confettiCanvas.style.width = "100vw";
      confettiCanvas.style.height = "100vh";
    }

    resizeConfettiCanvas();
    window.addEventListener("resize", resizeConfettiCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeConfettiCanvas, 150));

    const confettiInstance = confetti.create(confettiCanvas, {
      resize: false,
      useWorker: true
    });

    function fullScreenConfetti() {
      const end = Date.now() + 1600;

      (function frame() {
        confettiInstance({
          particleCount: 12,
          spread: 90,
          startVelocity: 45,
          ticks: 180,
          origin: { x: Math.random(), y: Math.random() * 0.3 }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();

      setTimeout(() => {
        confettiInstance({
          particleCount: 300,
          spread: 140,
          startVelocity: 60,
          ticks: 220,
          origin: { x: 0.5, y: 0.55 }
        });
      }, 300);
    }

    /* ---------- YES BUTTON GROWS ---------- */
    let yesScale = 1;
    function growYes() {
      yesScale = Math.min(2.2, yesScale + 0.1);
      yesBtn.style.transform = `translateY(-50%) scale(${yesScale})`;
    }

    /* ---------- NO BUTTON RUNS AWAY ---------- */
    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function moveNo(px, py) {
      const z = zone.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();

      let dx = (b.left + b.width / 2) - px;
      let dy = (b.top + b.height / 2) - py;
      let mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      let newLeft = (b.left - z.left) + dx * 150;
      let newTop  = (b.top - z.top) + dy * 150;

      newLeft = clamp(newLeft, 0, z.width - b.width);
      newTop  = clamp(newTop, 0, z.height - b.height);

      noBtn.style.left = newLeft + "px";
      noBtn.style.top = newTop + "px";
      noBtn.style.transform = "none";

      growYes();
    }

    zone.addEventListener("pointermove", e => {
      const b = noBtn.getBoundingClientRect();
      const d = Math.hypot(
        (b.left + b.width / 2) - e.clientX,
        (b.top + b.height / 2) - e.clientY
      );
      if (d < 140) moveNo(e.clientX, e.clientY);
    });

    noBtn.addEventListener("click", e => e.preventDefault());

    /* ---------- YES CLICK ---------- */
    yesBtn.addEventListener("click", () => {
      zone.style.display = "none";
      hint.style.display = "none";
      result.style.display = "block";
      resizeConfettiCanvas();
      fullScreenConfetti();
    });
  </script>
</body>
</html>
